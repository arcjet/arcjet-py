name: Test

on:
  pull_request:
    types:
      - labeled
      - opened
      - reopened
      - synchronize
      - unlabeled
  merge_group: 
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Fetch base branch for griffe comparison
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.event.pull_request.base.ref }}
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      - name: Ruff lint
        run: uv run ruff check . --output-format github
      - name: Ruff format
        run: uv run ruff format --diff .
      - name: Ty type check
        run: uv run ty check --output-format github
      - name: Pyright type check
        run: uv run pyright
      - name: Griffe check
        # Only run on PRs and allow breaking changes to be merged with a label
        if: github.event_name == 'pull_request'
        continue-on-error: ${{ contains(github.event.pull_request.labels.*.name, 'breaking') }}
        run: uv run griffe check arcjet --search src --format github --against origin/${{ github.event.pull_request.base.ref }}


  test:
    name: Run tests
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      - name: Tests
        run: uv run pytest
